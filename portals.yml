# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # [CUSTOMIZE] Add keywords matching YOUR target roles
    # -- AI/ML roles --
    - "AI"
    - "ML"
    - "LLM"
    - "Agent"
    - "Agentic"
    - "GenAI"
    - "Generative AI"
    - "NLP"
    - "LLMOps"
    - "MLOps"
    - "Voice AI"
    - "Conversational AI"
    - "Speech"
    # -- German AI/ML keywords (DACH market) --
    - "KI"
    - "Künstliche Intelligenz"
    - "KI Engineer"
    - "KI Trainer"
    - "Dozent"
    - "Weiterbildung"
    # -- Engineering roles --
    - "Platform Engineer"
    - "Solutions Architect"
    - "Solutions Engineer"
    - "Forward Deployed"
    - "Deployed Engineer"
    - "Customer Engineer"
    - "Integration Engineer"
    # -- Product roles --
    - "Product Manager"
    - "Technical PM"
    # -- Automation roles --
    - "Automation"
    - "Hyperautomation"
    - "Low-Code"
    - "No-Code"
    - "GTM Engineer"
    - "RevOps"
    - "Business Systems"
    - "Internal Tools"
    - "Transformation"
    # -- 한국어 직무 키워드 (Korean market) --
    - "개발자"
    - "엔지니어"
    - "백엔드"
    - "프론트엔드"
    - "풀스택"
    - "데브옵스"
    - "보안"
    - "블록체인"
    - "데이터"
    - "인공지능"
    - "머신러닝"
    - "클라우드"
    - "플랫폼"
    - "SRE"
    - "Security"
    - "Backend"
    - "Frontend"
    - "Full-stack"
    - "Fullstack"
    - "DevOps"
    - "Smart Contract"
    - "Blockchain"
    - "Web3"
    - "Solidity"
    - "Rust"
    - "AI Engineer"
    - "Researcher"
  negative:
    # [CUSTOMIZE] Add keywords for roles you want to exclude
    - "Intern"
    - "인턴"
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
# ── Korean Job Portals (Level 1.5 — Playwright keyword search) ──────
# Unlike tracked_companies (which scan individual company pages),
# these are job aggregators that use keyword-based search.
# Scanned by navigating to search_url with each keyword.

kr_job_portals:
  - name: 원티드 (Wanted)
    base_url: https://www.wanted.co.kr
    search_url: "https://www.wanted.co.kr/search?query={keyword}&tab=position"
    keywords:
      - "블록체인 보안"
      - "Web3 엔지니어"
      - "스마트 컨트랙트"
      - "Smart Contract Auditor"
      - "Blockchain Security"
    selectors:
      card: 'a[href^="/wd/"]'
      title: "strong"
      company: "span"
    scroll_mode: infinite
    max_scrolls: 3
    url_pattern: "https://www.wanted.co.kr{href}"
    enabled: true

  - name: 점핏 (Jumpit)
    base_url: https://www.jumpit.co.kr
    search_url: "https://www.jumpit.co.kr/search?query={keyword}"
    keywords:
      - "블록체인"
      - "Web3"
      - "보안 엔지니어"
      - "스마트 컨트랙트"
      - "블록체인 보안"
    selectors:
      card: 'a[href^="/position/"]'
      title: "h2"
      company: "div:first-child > div"  # content_div 내 첫 번째 요소 = 회사명
    scroll_mode: infinite
    max_scrolls: 3
    url_pattern: "https://www.jumpit.co.kr{href}"
    enabled: true

  - name: 로켓펀치 (RocketPunch)
    base_url: https://www.rocketpunch.com
    search_url: "https://www.rocketpunch.com/jobs?keywords={keyword}"
    keywords:
      - "블록체인 보안"
      - "Web3 엔지니어"
    scroll_mode: pagination
    max_pages: 3
    enabled: true

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # ── Korean Market (Blockchain / Security / Backend) ──────────────────

  - name: Wanted — 블록체인 보안
    query: 'site:wanted.co.kr "블록체인" OR "스마트 컨트랙트" OR "Web3" "보안" OR "Security" "엔지니어" OR "개발자"'
    enabled: true

  - name: Wanted — Blockchain Engineer
    query: 'site:wanted.co.kr "Blockchain Engineer" OR "Smart Contract" OR "Solidity" OR "Web3 Developer"'
    enabled: true

  - name: Wanted — 보안 엔지니어 (금융/핀테크)
    query: 'site:wanted.co.kr "보안 엔지니어" OR "Security Engineer" 블록체인 OR 핀테크 OR 가상자산 OR 거래소'
    enabled: true

  - name: Wanted — 백엔드 (블록체인)
    query: 'site:wanted.co.kr "백엔드 엔지니어" OR "Backend Engineer" 블록체인 OR Web3 OR 가상자산'
    enabled: true

  - name: Jumpit — 블록체인/보안
    query: 'site:jumpit.co.kr "블록체인" OR "Web3" OR "스마트 컨트랙트" OR "보안 엔지니어"'
    enabled: true

  - name: Programmers — 블록체인/보안
    query: 'site:career.programmers.co.kr "블록체인" OR "Blockchain" OR "Smart Contract" OR "보안 엔지니어"'
    enabled: false   # 2025.05 서비스 종료

  - name: Jobplanet — 블록체인/보안 채용
    query: 'site:jobplanet.co.kr "블록체인 개발자" OR "Web3 엔지니어" OR "보안 엔지니어" 채용'
    enabled: true

  - name: Indeed KR — 블록체인/보안
    query: 'site:kr.indeed.com "블록체인" OR "Blockchain" OR "Smart Contract" OR "보안 엔지니어"'
    enabled: true

  - name: Indeed KR — Web3 Developer
    query: 'site:kr.indeed.com "Web3" OR "Solidity" OR "DeFi" "엔지니어" OR "개발자"'
    enabled: true

  # -- Ashby --
  - name: Ashby — AI PM
    query: 'site:jobs.ashbyhq.com "AI Product Manager" OR "Senior Product Manager AI" remote'
    enabled: true

  - name: Ashby — Solutions Architect
    query: 'site:jobs.ashbyhq.com "Solutions Architect" AI OR automation remote'
    enabled: true

  - name: Ashby — AI Engineer
    query: 'site:jobs.ashbyhq.com "AI Engineer" OR "LLM Engineer" OR "Forward Deployed" remote'
    enabled: true

  - name: Ashby — Agentic
    query: 'site:jobs.ashbyhq.com "Agentic" OR "AI Agent" OR "Automation Architect" remote'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — AI PM
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Product Manager" OR "Senior Product Manager" AI remote'
    enabled: true

  - name: Greenhouse — SA & FDE
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Solutions Architect" OR "Forward Deployed" AI remote'
    enabled: true

  - name: Greenhouse — AI Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Engineer" OR "LLM" OR "Agentic" remote'
    enabled: true

  # -- Lever --
  - name: Lever — AI PM
    query: 'site:jobs.lever.co "AI Product Manager" OR "Solutions Architect" AI remote'
    enabled: true

  - name: Lever — AI Roles
    query: 'site:jobs.lever.co "AI Engineer" OR "Agentic" OR "LLMOps" OR "Automation" remote'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — AI PM
    query: 'site:wellfound.com "AI Product Manager" OR "AI Solutions" remote'
    enabled: true

  # -- Workable --
  - name: Workable — AI Roles
    query: 'site:apply.workable.com "AI" "Product Manager" OR "Solutions Architect" OR "AI Engineer" remote'
    enabled: true

  # -- No-Code / Low-Code / Automation --
  - name: Ashby — No-Code & Automation
    query: 'site:jobs.ashbyhq.com "no-code" OR "low-code" OR "automation engineer" OR "n8n" OR "Make" OR "Airtable" remote senior'
    enabled: true

  - name: Greenhouse — No-Code & Automation
    query: 'site:job-boards.greenhouse.io "no-code" OR "low-code" OR "automation engineer" OR "business systems" senior remote'
    enabled: true

  - name: GTM Engineer — All portals
    query: '"GTM Engineer" OR "RevOps Engineer" OR "Growth Engineer" automation Airtable OR Make OR Clay remote'
    enabled: true

  # -- Voice AI & Conversational AI --
  - name: Voice AI — FDE & SA
    query: 'site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com "Voice AI" OR "Conversational AI" OR "Speech" "Solutions" OR "Forward Deployed" OR "Customer Engineer"'
    enabled: true

  - name: Voice AI — AI Engineer
    query: 'site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com "Voice" OR "Speech" "AI Engineer" OR "Deployment" OR "Integration"'
    enabled: true

  # -- Contact Center AI --
  - name: Contact Center AI — SA & SE
    query: '"contact center" OR "customer service" "AI" "Solutions Architect" OR "Solutions Engineer" OR "Forward Deployed" remote'
    enabled: true

  # -- FDE specific (cross-portal) --
  - name: FDE & Deployed Engineer — All portals
    query: '"Forward Deployed Engineer" OR "Deployed Engineer" OR "Deployment Engineer" AI site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com OR site:jobs.lever.co'
    enabled: true

  # -- RemoteFront (aggregator) --
  - name: RemoteFront — AI & Automation
    query: 'site:remotefront.com "AI Engineer" OR "Solutions Engineer" OR "Automation" OR "LLM" OR "Agent" remote'
    enabled: true

